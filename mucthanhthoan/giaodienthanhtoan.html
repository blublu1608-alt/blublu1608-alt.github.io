<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Đặt vé Sự kiện</title>
    <link rel="stylesheet" href="giaodienthanhtoan.css">
</head>
<body>

<nav class="main-nav">
    <div class="nav-wrapper">
        <a href="#" class="logo">EVENT<span>PRO</span></a>
        <ul class="nav-links">
            <li><a href="#">Index</a></li>
            <li><label for="step1">Đặt vé</label></li>
            <li><label for="step3">Đăng ký</label></li>
            <li><a href="#" class="admin-btn">Admin</a></li>
        </ul>
    </div>
</nav>

<div class="main-content">
    <input type="radio" name="flow" id="step1" checked>
    <input type="radio" name="flow" id="step2">
    <input type="radio" name="flow" id="step3">
    <input type="radio" name="flow" id="step4">

    <section class="screen section-event">
        <h2>Bước 1: Chọn Sự Kiện</h2>
        <div class="card-grid">
            <label for="step2" class="card">
                <h3>Summit Công Nghệ 2026</h3>
                <p>Hà Nội - 15/05/2026</p>
                <span class="btn">Chọn sự kiện</span>
            </label>
        </div>
    </section>

    <section class="screen section-center section-seating">
        <div class="content-box">
            <h2>Bước 2: Chọn Vị Trí Ghế</h2>
            <div class="seating-map">
                <div class="screen-bar">SÂN KHẤU</div>
                <div class="seats">
                    <input type="checkbox" id="s1"><label for="s1" class="seat vip"></label>
                    <input type="checkbox" id="s2"><label for="s2" class="seat vip"></label>
                    <div class="seat occupied"></div>
                    <input type="checkbox" id="s3"><label for="s3" class="seat"></label>
                </div>
            </div>
            <label for="step3" class="btn">Xác nhận chỗ ngồi</label>
        </div>
    </section>

    <section class="screen section-center section-billing">
        <div class="form-container">
            <div class="form-header">FORM ĐĂNG KÝ SỰ KIỆN</div>
            <div class="form-body">
                <p>✓ Nhập thông tin <br> ○ Xác nhận</p>
                <div class="field">
                    <label>HỌ TÊN</label>
                    <input type="text" value="Nguyễn Văn A">
                    <small>✓ Tên hợp lệ</small>
                </div>
                <div class="field">
                    <label>EMAIL</label>
                    <input type="email" value="vanna@email.com">
                    <small>✓ Email hợp lệ</small>
                </div>
                <div class="field">
                    <label>SỐ ĐIỆN THOẠI</label>
                    <input type="text" value="090-123-4567">
                    <small>✓ Số điện thoại hợp lệ</small>
                </div>
                <label for="step4" class="btn-confirm">XÁC NHẬN THANH TOÁN</label>
            </div>
        </div>
    </section>

    <section class="screen section-center section-success">
        <div class="success-box">
            <div class="icon-check">✓</div>
            <h3>ĐĂNG KÝ THÀNH CÔNG!</h3>
            <label for="step1" class="btn">Quay lại trang chủ</label>
        </div>
    </section>
</div>

</body>
</html>
